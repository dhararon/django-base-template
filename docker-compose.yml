version: '3'

volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}

networks:
  local-development:

services:
  postgres:
    extends:
      file: compose/service.postgres.yml
      service: postgres
    ports:
      - "5435:5432"
    networks:
      - "local-development"
    env_file:
      - ../.envs/${ENVIRONMENT}/postgres.env
